<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Laporan Aduan - PU SDA Jatim</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Lapor Aduan Kerusakan</h2>
        <form id="laporanForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                <input type="text" id="nama" required class="w-full mt-1 p-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">No. HP (WhatsApp)</label>
                <input type="tel" id="noHp" required class="w-full mt-1 p-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Lokasi Kejadian</label>
                <input type="text" id="lokasi" required class="w-full mt-1 p-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Jenis Kerusakan</label>
                <select id="jenisKerusakan" class="w-full mt-1 p-2 border rounded-lg">
                    <option>Tanggul Jebol</option>
                    <option>Sampah Menumpuk</option>
                    <option>Pintu Air Rusak</option>
                    <option>Lainnya</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Deskripsi</label>
                <textarea id="deskripsi" rows="3" required class="w-full mt-1 p-2 border rounded-lg"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Foto Bukti</label>
                <input type="file" id="file" accept="image/*" class="w-full mt-1">
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-bold">
                Kirim Laporan
            </button>
        </form>
        <div id="statusMsg" class="mt-4 text-center font-semibold hidden"></div>
    </div>

    <script>
        const form = document.getElementById('laporanForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const statusMsg = document.getElementById('statusMsg');
            const submitBtn = document.getElementById('submitBtn');
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Mengirim...";
            
            const file = document.getElementById('file').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const params = {
                        nama: document.getElementById('nama').value,
                        noHp: document.getElementById('noHp').value,
                        lokasi: document.getElementById('lokasi').value,
                        jenisKerusakan: document.getElementById('jenisKerusakan').value,
                        deskripsi: document.getElementById('deskripsi').value,
                        fileData: e.target.result,
                        fileType: file.type,
                        fileName: file.name
                    };
                    kirimData(params);
                };
                reader.readAsDataURL(file);
            } else {
                // Jika tanpa foto
                const params = {
                    nama: document.getElementById('nama').value,
                    noHp: document.getElementById('noHp').value,
                    lokasi: document.getElementById('lokasi').value,
                    jenisKerusakan: document.getElementById('jenisKerusakan').value,
                    deskripsi: document.getElementById('deskripsi').value
                };
                kirimData(params);
            }
        });

        function kirimData(params) {
            // Ganti URL_APPS_SCRIPT dengan deployment URL Anda
            const url = "URL_APPS_SCRIPT_ANDA"; 
            fetch(url, {
                method: "POST",
                body: JSON.stringify(params)
            })
            .then(res => res.json())
            .then(data => {
                const statusMsg = document.getElementById('statusMsg');
                statusMsg.classList.remove('hidden', 'text-red-500');
                statusMsg.classList.add('text-green-500');
                statusMsg.innerText = "Laporan berhasil dikirim!";
                form.reset();
            })
            .catch(err => {
                const statusMsg = document.getElementById('statusMsg');
                statusMsg.classList.remove('hidden', 'text-green-500');
                statusMsg.classList.add('text-red-500');
                statusMsg.innerText = "Gagal kirim: " + err;
            })
            .finally(() => {
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = false;
                submitBtn.innerText = "Kirim Laporan";
            });
        }
    </script>
</body>
</html>
